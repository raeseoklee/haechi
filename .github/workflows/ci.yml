name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - run: npm run release:preflight
      - run: npm run sbom
      # actions/upload-artifact v6.0.0
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

  # A distinct, branch-protectable status over the cross-cutting security
  # invariants (no plaintext in audit, hard-block non-suppressible, AAD/AEAD
  # binding, the per-key nonce-budget fail-closed, privacy-profile strengthen-
  # only). These also run inside `verify`'s full suite, but a separate required
  # `security-gate` check means a suite restructure can never silently drop one,
  # and the gate fails loudly if a listed security test file goes missing.
  security-gate:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - run: npm run gate:security

  # Integration suites that the single Node-22 `verify` job above can only SKIP
  # (they are env-gated). This job supplies the backends so they actually run:
  #   - the ratelimit-redis cross-replica shared-budget test against a real Redis
  #   - the local-inference proxy<->upstream wire against an OpenAI/Ollama protocol
  #     stub (a real vLLM needs a GPU; the stub exercises adapter routing + request/
  #     response protection over a real socket — real-model validation stays manual).
  integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      # actions/checkout v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      # `redis` is the satellite's OPTIONAL peer — install it for this job only,
      # without touching package.json/lockfile (core stays zero-dependency).
      - run: npm install --no-save redis
      - name: ratelimit-redis cross-replica integration (real Redis)
        env:
          HAECHI_REDIS_URL: redis://127.0.0.1:6379
        run: node --test satellites/ratelimit-redis/ratelimit-redis.integration.test.mjs
      - name: store-redis cross-replica integration (real Redis)
        env:
          HAECHI_REDIS_URL: redis://127.0.0.1:6379
        run: node --test satellites/store-redis/store-redis.integration.test.mjs
      - name: local-inference integration (OpenAI/Ollama protocol stub)
        env:
          HAECHI_VLLM_URL: http://127.0.0.1:8717
          HAECHI_OLLAMA_URL: http://127.0.0.1:8717
        run: |
          STUB_PORT=8717 node tests/helpers/local-inference-stub.mjs &
          STUB_PID=$!
          for i in $(seq 1 50); do
            curl -sf -o /dev/null -X POST -d '{}' http://127.0.0.1:8717/api/generate && break
            sleep 0.2
          done
          node --test tests/local-inference.integration.test.mjs
          status=$?
          kill "$STUB_PID" 2>/dev/null || true
          exit $status

  # The process-isolated plugin sandbox's behavioral fs/net capability-denial
  # tests only run on a Node that ENFORCES the --allow-net permission (Node >=24;
  # the Node-22 `verify` job runs only the fail-closed contract). This job runs
  # them for real on Node 26 and fails loudly if the runner cannot enforce, so the
  # strongest containment claim (P1-SEC-027) can never silently skip in CI.
  sandbox-net:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "26.x"
          cache: "npm"
      - run: npm ci
      - name: Assert --allow-net enforcement is available (no silent skip)
        run: >-
          node -e "import('./packages/plugin/process-sandbox.mjs').then(m => {
          if (!m.netEnforcementSupported()) { console.error('FATAL: this Node does not enforce --allow-net; the behavioral sandbox tests would skip. Bump the node-version.'); process.exit(1); }
          console.log('--allow-net enforcement: supported'); });"
      - run: node --test tests/plugin-process-sandbox.test.mjs
