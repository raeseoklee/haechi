name: Publish Container Image (GHCR)

# Build the hardened reference image (root Dockerfile) and push it to GHCR on a
# core `v<semver>` release, then keylessly cosign-sign it by digest (GitHub OIDC,
# no signing keys). Mirrors npm-publish.yml's trust posture for the container
# distribution shape (see docs/current/operations-runbook.md / release-process.md).
on:
  release:
    types: [published]

permissions:
  contents: read        # checkout
  packages: write       # push to GHCR
  id-token: write       # OIDC for keyless cosign signing
  attestations: write   # sigstore build-provenance attestation of the image

jobs:
  image:
    runs-on: ubuntu-latest
    # Only core `v<semver>` releases. Satellite releases use prefixed tags
    # (e.g. `crypto-kms-v0.1.0`) and must NOT build/push the core image.
    if: startsWith(github.event.release.tag_name, 'v')
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/haechi
    steps:
      - name: Validate core release tag
        run: |
          tag='${{ github.event.release.tag_name }}'
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag '$tag' is not a core v<semver> tag; refusing to build the image"
            exit 1
          fi
      # actions/checkout v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # sigstore/cosign-installer v3.7.0
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da
      # docker/metadata-action v5.6.1 — derive tags/labels from the release tag.
      - id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96
        with:
          images: ${{ env.IMAGE }}
          # v1.3.3 -> tags 1.3.3, 1.3, latest (semver). The leading `v` is stripped.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      # docker/login-action v3.3.0 — auth to GHCR with the job's GITHUB_TOKEN.
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # docker/build-push-action v6.10.0 — build the root Dockerfile and push.
      - id: build
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false   # we attest separately below (keyless sigstore)
      # Keyless cosign signature over the immutable digest (not the mutable tag).
      - name: Cosign sign by digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
      # sigstore build-provenance attestation of the pushed image, by digest.
      # actions/attest-build-provenance v4.1.0 (same SHA as npm-publish.yml).
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
